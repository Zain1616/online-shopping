<div class="container">

<div class="section2">
<div class="menu-item itema" data-name="cabbage"><button onclick="addItem(this, 750)">k750. ADD</button></div>
<div class="menu-item itemb" data-name="carrot"><button onclick="addItem(this, 300)">k300. ADD</button></div>

<div class="menu-item itemh" data-name="fish"><button onclick="addItem(this, 1870)">k1870. ADD</button></div>
<div class="menu-item itemi" data-name="fanta or coca-cola or coke"><button onclick="addItem(this, 750)">k750. ADD</button></div>
<div class="menu-item itemj" data-name="fanta or orange"><button onclick="addItem(this, 750)">k750. ADD</button></div>
<div class="menu-item itemk" data-name="champagne"><button onclick="addItem(this, 23600)">k23600. ADD</button></div>
<div class="menu-item iteml" data-name="ice cream"><button onclick="addItem(this, 1300)">k1300. ADD</button></div>
<div class="menu-item itemm" data-name="chips or fries"><button onclick="addItem(this, 11000)">k11000. ADD</button></div>
<div class="menu-item itemn" data-name="pizza"><button onclick="addItem(this, 15500)">k15500. ADD</button></div>
<div class="menu-item itemo" data-name="noodles or sparghetti"><button onclick="addItem(this, 3000)">k3000. ADD</button></div>
<div class="menu-item itemp" data-name="rice"><button onclick="addItem(this, 6850)">k6850. ADD</button></div>
</div>
</div>
  
<button class="btn" onclick="goToCart()">View Items</button>
<div id="popup">Item Added</div>

  
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addItem(button, price) {
  const itemDiv = button.closest(".menu-item");
  const name = itemDiv.dataset.name;

  cart.push({ name, price });
  localStorage.setItem("cart", JSON.stringify(cart));

  
  let popup = document.getElementById("popup");
  if (popup) {
    popup.innerText = "Added ✔ Price: k" + price;
    popup.style.opacity = "1";
    setTimeout(() => {
      popup.style.opacity = "0";
    }, 2000);
  }
}
</script>
<script>
function goToCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "cart.html";
}
</script>
<script>
const searchBar = document.getElementById("searchBar");

searchBar.addEventListener("input", function () {
  const query = searchBar.value.toLowerCase();
  const items = document.querySelectorAll(".menu-item");

  items.forEach(item => {
    const name = item.dataset.name.toLowerCase();
    item.style.display = name.includes(query) ? "block" : "none";
  });
});
</script>
