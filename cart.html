<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{
  background-color: wheat;
  margin: 0;
  font-size: 16px;
}
#placeOrderBtn{
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  background-color: green;
  color: white;
  font-size: 18px;
  border: none;
  border-radius: 8px;
}



input{
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

  
.container{
  height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header{
  display: flex;
  align-items: center;
  background-color: rgb(228, 0, 43);
  height: 15%;
  width: 100%;
}

.logo{
  background-image: url("https://mail.toppng.com/uploads/preview/kfc-logo-png-transparent-background-photoshop-11660168874txq8ipsxve.png");
  background-size: cover;
  background-position: center;
  height: 100%;
  width: 20%;
}

.search{
  margin-left: auto;
  margin-right: 20px;
  height: 40px;
  width: 200px;
  border-radius: 15px;
  padding: 10px;
}




  
.zain{
  background-image: url("https://raw.githubusercontent.com/Zain1616/znpic/refs/heads/main/IMG-20260421-WA0071.jpg");
  background-size: cover;
  height: 50px;
  width: 50px;
  }
  #items{
  flex: 1;                   
  width: 100%;
  overflow-y: auto;          
  margin: 10px 0;
  }
  
  .receipt{
background-color: white;
width: 95%;
max-width: 450px;
margin-top: 20px;
padding: 15px;
display: flex;
flex-direction: column;
align-items: center;
border: 1px solid black;
}. 


.top{
  display: flex;
  align-items: center;
  gap: 10px;
}

.chef{
  background-image: url("https://static.vecteezy.com/system/resources/thumbnails/052/793/073/small/chef-logo-design-vector.jpg");
  background-size: cover;
  height: 50px;
  width: 50px;
}

#items p{
  margin: 5px 0;
}

#total{
  font-size: 24px;
  font-weight: bold;
  color: green;
}

.blocks{
  width: 100%;
  margin-top: 10px;
}

.block1, .block2{
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="logo"></div>
    <input class="search" type="search" placeholder="search">
  </div>

  <div class="receipt">
    <div class="top">
      <div class="chef"></div>
      <h1>Your Selected Items</h1>
    </div>

    <div id="items"></div>
    <h2 id="total"></h2>

    <div class="blocks">
      <div class="block1">
        <p id="date"></p>
        <p>Signature: ............</p>
      </div>
      <div class="block2">
        <p>Tel: +265 981694719</p>
        <p>Email: Kum@gmail.com</p>
      </div>

   <img 
  onclick="contactUs()"
  style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    cursor: pointer;
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    background: #25D366;
    padding: 10px;
  "
  src="data:image/svg+xml;utf8,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'>
    <path fill='white' d='M19.11 17.47c-.28-.14-1.64-.81-1.9-.9-.26-.1-.45-.14-.64.14-.19.28-.74.9-.9 1.09-.17.19-.33.21-.61.07-.28-.14-1.18-.43-2.25-1.38-.83-.74-1.39-1.66-1.55-1.94-.16-.28-.02-.43.12-.57.12-.12.28-.33.42-.5.14-.17.19-.28.28-.46.09-.19.05-.35-.02-.5-.07-.14-.64-1.54-.88-2.11-.23-.55-.47-.48-.64-.49h-.55c-.19 0-.5.07-.76.35-.26.28-1 .98-1 2.39s1.02 2.77 1.16 2.96c.14.19 2.02 3.08 4.89 4.32.68.29 1.21.47 1.62.6.68.22 1.3.19 1.79.12.55-.08 1.64-.67 1.87-1.32.23-.65.23-1.2.16-1.32-.07-.12-.26-.19-.54-.33z'/>
  </svg>"
/>   
    </div>

    <p>Thank you for ordering with us</p>
    <div class="chef"></div>

    <div style="width:90%; margin-top:10px;">
  <input id="customerName" placeholder="Customer Name" />
  <input id="houseNo" placeholder="House Number" />
</div>

    
    <button id="placeOrderBtn" onclick="placeOrder()">Place Order</button>
    <button onclick="clearCart()" style="background:red; color:white; padding:10px; width:100%; border:none; border-radius:8px; margin-top:10px;">Remove All ❌</button>
  </div>
</div>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart() {
  let itemsDiv = document.getElementById("items");
  let total = 0;

  itemsDiv.innerHTML = "";

  cart.forEach((item, index) => {
    if (!item || !item.name || !item.price) return;

    let div = document.createElement("div");
    div.style.display = "flex";
    div.style.justifyContent = "space-between";
    div.style.alignItems = "center";
    div.style.width = "100%";

    let p = document.createElement("p");
    p.innerText = item.name + " — K" + item.price;

    let btn = document.createElement("button");
    btn.innerText = "Remove";
    btn.style.background = "red";
    btn.style.color = "white";
    btn.style.border = "none";
    btn.style.padding = "5px 10px";
    btn.style.borderRadius = "5px";

    btn.onclick = function () {
      removeItem(index);
    };

    div.appendChild(p);
    div.appendChild(btn);
    itemsDiv.appendChild(div);

    total += Number(item.price);
  });

  document.getElementById("total").innerText = "Total: K" + total;
  document.getElementById("date").innerText =
    "Date & Time: " + new Date().toLocaleString();
}
function clearCart() {
  localStorage.removeItem("cart");
  cart = [];
  renderCart();
  }
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function placeOrder() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  const name = document.getElementById("customerName").value;
  const house = document.getElementById("houseNo").value;
if (!name || !house) {
  alert("Please enter customer name and house number");
  return;
}
  fetch("https://wtf8kqtrstge.share.zrok.io/order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      customerName: name,
      houseNumber: house,
      items: cart
    })
  })
  .then(res => res.text())
  .then(data => {
    alert(data);
    localStorage.removeItem("cart");
    cart = [];
    renderCart();
  })
.catch(err => {
    alert("Server not reachable ❌");
    console.log(err);
  });
}

  function contactUs() {
  let phone = "265981694719";
  let message = "Hello 👋 I would like to place my order.";

  let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
  }

renderCart();
</script>
</body>
</html>
