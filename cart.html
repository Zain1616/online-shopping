<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{
  background-color: wheat;
  margin: 0;
  font-size: 16px;
}

.container{
  height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header{
  display: flex;
  align-items: center;
  background-color: rgb(228, 0, 43);
  height: 15%;
  width: 100%;
}

.logo{
  background-image: url("https://mail.toppng.com/uploads/preview/kfc-logo-png-transparent-background-photoshop-11660168874txq8ipsxve.png");
  background-size: cover;
  background-position: center;
  height: 100%;
  width: 20%;
}

.search{
  margin-left: auto;
  margin-right: 20px;
  height: 40px;
  width: 200px;
  border-radius: 15px;
  padding: 10px;
}

.l

  #items{
  flex: 1;                   
  width: 100%;
  overflow-y: auto;          
  margin: 10px 0;
  }
  .receipt{
  background-color: white;
  width: 90%;
  max-width: 450px;
  height: 80vh;              
  margin-top: 20px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  border: 1px solid black;
  }


.top{
  display: flex;
  align-items: center;
  gap: 10px;
}

.chef{
  background-image: url("https://static.vecteezy.com/system/resources/thumbnails/052/793/073/small/chef-logo-design-vector.jpg");
  background-size: cover;
  height: 50px;
  width: 50px;
}

#items p{
  margin: 5px 0;
}

#total{
  font-size: 24px;
  font-weight: bold;
  color: green;
}

.blocks{
  width: 100%;
  margin-top: 10px;
}

.block1, .block2{
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="logo"></div>
    <input class="search" type="search" placeholder="search">
  </div>

  <div class="receipt">
    <div class="top">
      <div class="chef"></div>
      <h1>Your Selected Items</h1>
    </div>

    <div id="items"></div>
    <h2 id="total"></h2>

    <div class="blocks">
      <div class="block1">
        <p>Date: 28 April 2026</p>
        <p>Signature: ............</p>
      </div>
      <div class="block2">
        <p>Tel: +265 981694719</p>
        <p>Email: Kum@gmail.com</p>
      </div>
    </div>

    <p>Thank you for ordering with us</p>
    <div class="chef"></div>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let itemsDiv = document.getElementById("items");

cart.forEach(price => {
  let p = document.createElement("p");
  p.innerText = "Item: K" + price;
  itemsDiv.appendChild(p);
  total += price;
});

document.getElementById("total").innerText = "Total: K" + total;
</script>

</body>
</html>
